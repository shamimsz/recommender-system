services:
  setup:
    build: .
    command: >
      bash -lc "python download_data.py
      && python src/etl.py
      && python -m src.train_svd --no-eval --no-mlflow"
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=3).raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ui:
    build: .
    command: streamlit run src/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      RECOMMENDER_API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
    depends_on:
      - api
